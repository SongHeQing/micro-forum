# FRP 客户端配置 (YAML 格式)
# 支持环境变量：使用 {{ .Envs.VAR_NAME }} 语法

# FRP 服务端地址，需要替换为你的FRP服务器公网IP或域名
serverAddr: "songheqing.top"
# FRP 服务端端口，默认为7000
serverPort: {{ .Envs.BIND_PORT }}

# 客户端连接认证token（需要与服务端配置一致）
auth:
  token: "{{ .Envs.FRP_TOKEN }}"

# 代理配置
proxies:
  - name: "micro-forum"
    # 代理服务名称，可自定义
    type: "http"
    # 代理类型，http表示HTTP协议代理
    localIP: "micro-forum-server"
    # 本地服务地址，在Docker环境中使用服务名称
    localPort: 8080
    # 本地服务端口，Spring Boot应用监听的端口
    customDomains: ["songheqing.top", "www.songheqing.top"]
    # 自定义域名，用户访问你服务时使用的域名

  - name: "minio-api"
    # MinIO API 代理服务
    type: "http"
    localIP: "minio"
    localPort: 9000
    customDomains: ["songheqing.top", "www.songheqing.top"]
    # 使用路径路由区分服务
    locations: ["/micro-forum-public/"]


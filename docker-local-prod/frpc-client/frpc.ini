[common]
# FRP 服务端地址，需要替换为你的FRP服务器公网IP或域名
server_addr = songheqing.top
# FRP 服务端端口，默认为7000
server_port = 7000
# 客户端连接认证token（需要与服务端配置一致）
token = %s(FRP_TOKEN)

[micro-forum]
# 代理服务名称，可自定义
name = micro-forum
# 代理类型，http表示HTTP协议代理
type = http
# 本地服务地址，在Docker环境中使用服务名称
local_ip = micro-forum-server
# 本地服务端口，Spring Boot应用监听的端口
local_port = 8080
# 自定义域名，用户访问你服务时使用的域名
custom_domains = songheqing.top
# ./nginx/conf.d/default.conf

server {
    listen 80; # Nginx 容器监听宿主机的 80 端口，对外提供 HTTP 访问

    server_name localhost 192.168.101.39; # Nginx 容器的域名，内网机器的nginx仅能内网访问

    # 启用预压缩资源支持（Vite打包生成的.gz文件）
    gzip_static on;
    
    # 可选：关闭动态gzip压缩，避免对未预压缩文件进行CPU密集型压缩
    gzip off;

    # 后端 API 反向代理配置
    # 所有以 /api/ 开头的请求都会被转发到你的 Spring Boot 后端服务
    location /api/ {
        # 去掉 /api 前缀，直接转发到后端
        # 例如：/api/user/register -> /user/register
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://micro-forum-server:8080;

        # 传递客户端的真实 IP、主机名等信息给后端服务
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 可选：如果你的后端应用涉及大文件上传，可能需要调整此参数
        # client_max_body_size 100M; # 例如，允许最大 100MB 的请求体大小
        # 添加或修改以下代理超时设置，例如设置为 60 秒
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 新增：调整代理行为，确保正确传递上游响应
        proxy_intercept_errors off; # 确保Nginx不拦截上游错误，直接传递
        proxy_buffering off;        # 关闭代理缓冲，直接流式传输响应
    }

    
    # 文件上传目录反向代理配置
    # 所有以 /uploads/ 开头的请求都会被转发到你的 Spring Boot 后端服务
    # location ^~ /uploads/ {  # 使用 ^~ 确保 /uploads/ 不被后面的正则捕获
    #     #  为什么 ^~ 如此重要？
    #     # Nginx 的 location 匹配优先级如下（从高到低）：
    #     # = 精确匹配（如 location = /）
    #     # ^~ 前缀匹配（一旦匹配，立即停止搜索，不检查正则）✅
    #     # ~ 或 ~* 正则匹配
    #     # 普通前缀匹配（如 location /uploads/）
    #     # 如果你用普通的 location /uploads/，Nginx 会继续检查后面的 ~* \.png$，而正则优先级更高 → 导致走静态规则！
    #     # 而 ^~ /uploads/ 会立即终止匹配流程，确保代理生效。
    #     # 坚持用 proxy_pass 提供 /uploads/：架构清晰，便于权限、日志、限流等统一管理。
    #     # 永远用 ^~ 保护路径前缀：避免被正则误捕获。
    #     # 本地和云服务器配置保持一致：避免“本地能跑，线上不行”。
    #     # 代理到 Spring Boot 应用，现在它直接运行在宿主机的 8080 端口
    #     proxy_pass http://micro-forum-server:8080;

    #     # 传递客户端的真实 IP、主机名等信息给后端服务
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
        
    #     # 关闭缓冲以提高大文件传输性能
    #     proxy_buffering off;
    #     proxy_request_buffering off;  # 对于上传请求也关闭缓冲
        
    #     # 设置适当的超时时间
    #     proxy_connect_timeout 60s;
    #     proxy_send_timeout 300s;      # 上传可能需要更长时间
    #     proxy_read_timeout 300s;      # 下载可能需要更长时间

    #     # 设置缓存策略
    #     # expires 30d;
    #     # add_header Cache-Control "public, must-revalidate";
    #     # # 如果你的前端和图片服务不在同一个域，这个头信息有助于解决跨域加载问题
    #     # add_header Cross-Origin-Resource-Policy "cross-origin"; 
    # }

        # MinIO对象存储反向代理配置
    # 所有以 /storage/ 开头的请求都会被转发到 MinIO 服务
    location /storage/micro-forum-public/ {
        # 代理到 MinIO 服务（API端口为9000）
        proxy_pass http://minio:9000/;

        # 传递客户端的真实 IP、主机名等信息给后端服务
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 关闭缓冲以提高文件传输性能
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 设置适当的超时时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;      # 上传可能需要更长时间
        proxy_read_timeout 300s;      # 下载可能需要更长时间
    }

    # 你的前端资源（JS/CSS）是带 hash 的（Vite 默认），可以长期缓存：
    # 静态资源缓存 + Vary 针对静态资源的高性能缓存优化配置
     # 1.匹配特定后缀的静态文件
     # ~*：表示不区分大小写的正则匹配
     # \.(js|css|...)$：匹配以 .js、.css、.png 等结尾的请求路径
     # 常见于：Vite/React/Vue 打包生成的 带 hash 的静态资源（如 main.a1b2c3.js）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ { 
        #  2. 设置根目录
            # 告诉 Nginx 这些文件在容器内的哪个目录下
            # 通常对应你挂载的前端构建产物（如 dist/ 目录）
        root /usr/share/nginx/html;
        # 3. 设置浏览器缓存过期时间为 1 年
            # Nginx 会自动添加响应头：Expires: Wed, 22 Oct 2026 12:00:00 GMT 
            # 浏览器看到这个头，在1 年内不会重新请求该文件（除非用户强制刷新）
        expires 1y;
        #  4. 添加更现代的缓存控制头
            # public：允许 CDN、代理、浏览器缓存
            # immutable：关键优化！
            # 告诉浏览器：“这个 URL 的内容永远不会变”，即使用户点击刷新，也不要发 If-None-Match 请求，直接用本地缓存。
            # immutable能显著减少 304 请求，提升二次加载速度（支持情况：现代浏览器基本都支持）。
        add_header Cache-Control "public, immutable";
        # 虽然你关了动态 gzip，但 gzip_static 返回的 .gz 文件仍然需要告知 CDN/浏览器：响应内容依赖 Accept-Encoding。 这能避免 CDN 缓存错误（比如缓存了 gzip 版本却返回给不支持 gzip 的老浏览器）。
        # “这个响应的内容，取决于请求头中的 Accept-Encoding 字段。
        # 如果两个请求的 Accept-Encoding 不同，就算 URL 一样，也要当成不同的缓存项！”
        # 于是：CDN 会为 Accept-Encoding: gzip 缓存一份（gzip 内容）
        # 为无 Accept-Encoding 或 Accept-Encoding: identity 缓存另一份（原始内容）
        # 用户 A 和 B 各取所需，都不会出错
        add_header Vary Accept-Encoding;
    }

    # 前端静态文件服务配置
    # 这个 location 会处理所有未被后续 /api/ 和 /uploads/ 匹配到的请求
    location / {
        root /usr/share/nginx/html; # 对应 docker-compose.yml 中 ./nginx/html 卷映射的容器内部路径
        index index.html index.htm; # 默认索引文件
        # 对于单页应用（SPA，如 Vue, React, Angular），这个 try_files 非常重要，
        # 它确保浏览器刷新页面或直接访问深层路由时，Nginx 能返回 index.html
        try_files $uri $uri/ /index.html;
        # 添加 Vary 头以确保正确缓存
        add_header Vary Accept-Encoding;
    }

    # 文件上传目录反向代理配置
    # # 所有以 /uploads/ 开头的请求都会被 Nginx 直接从对应的持久化卷提供服务
    # location /uploads/ {
    #     # alias 用于替换 location 匹配到的路径。
    #     # /usr/share/nginx/html/uploads/ 是 micro_forum_uploads 卷在 Nginx 容器内部的挂载路径
    #     alias /usr/share/nginx/html/uploads/; 

    #     # 可选：设置静态文件的缓存策略，提高加载速度
    #     expires 30d; # 缓存 30 天
    #     add_header Cache-Control "public, must-revalidate";
    #     # 如果你的前端和图片服务不在同一个域，这个头信息有助于解决跨域加载问题
    #     add_header Cross-Origin-Resource-Policy "cross-origin"; 
    # }
    # ❌ 只注释 alias 而不处理 location 优先级 → 仍会 404
    # ❌ 把 location /uploads/ 放在 location ~* \.png$ 后面 → 正则优先匹配
    # ❌ 在云服务器上手动复制文件到 /usr/share/nginx/html/uploads/ → 临时方案，不可维护
    

    # 错误页面配置（可选）：当 Nginx 遇到 5xx 错误时，返回自定义的页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html; # 错误页面通常放在静态文件根目录
    }
}
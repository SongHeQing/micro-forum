# FRP服务端配置文件 (INI格式)

[common]
# 服务端监听的端口，客户端需要连接这个端口
bind_port = %s(BIND_PORT)

# HTTP访问的端口（用于Web服务）
vhost_http_port = 8080

# HTTPS访问的端口（如果需要HTTPS）
# vhost_https_port = 443

# 仪表盘端口，用于查看FRP状态
dashboard_port = %s(DASHBOARD_PORT)

# 仪表盘绑定地址，默认为127.0.0.1，需要改为0.0.0.0才能外部访问
dashboard_addr = 0.0.0.0

# 仪表盘用户名和密码
dashboard_user = %s(DASHBOARD_USER)
dashboard_pwd = %s(DASHBOARD_PWD)

# 启用详细的日志记录
log_file = ./frps.log
log_level = info
log_max_days = 3

# 客户端连接认证token（需要与客户端配置一致）
token = %s(FRP_TOKEN)

# 允许客户端使用自定义域名
allow_user_defined_domains = true

# 最大连接池数量
max_pool_count = 100

# TCP流多路复用
tcp_mux = true
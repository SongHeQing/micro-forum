# ./src/main/resources/application-dev.yml

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/micro-forum
    username: root
    password: 123456

  # flyway配置
  flyway:
    clean-disabled: false   # 禁用./mvnw flyway:clean，默认值为false
    validate-on-migrate: true # Flyway checksum 验证，默认值为true开启
    baseline-on-migrate: true # Flyway 基线，默认值为false关闭
    baseline-version: 1

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      # password: 123456 # 移除密码配置，因为本地Redis未设置密码
      database: 0 # 数据库索引，默认为0
      lettuce:
        pool:
          max-active: 8 # 最大连接数
          max-wait: -1ms # 最大等待时间
          max-idle: 8 # 最大空闲连接数
          min-idle: 0 # 最小空闲连接数

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB      # 单个文件最大5MB，默认10MB
      max-request-size: 10MB   # 单次请求最大10MB,默认20MB

  # Email Configuration for Netease (163.com)
  mail:
    host: smtp.163.com
    port: 465  # 推荐使用SSL端口465，或者TLS端口587
    username: microforum@163.com # 例如：yourname@163.com
    password: PRUR2KS6fyWzzj9V   # 这里填写你上面获取到的授权码，不是你的邮箱登录密码
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true # 启用SSL加密
          timeout: 10000 # 连接超时时间 (毫秒)
          connectiontimeout: 10000 # 连接超时时间 (毫秒)
          writetimeout: 10000 # 写入超时时间 (毫秒)

# 如果你使用的是 587 端口 (STARTTLS)，配置略有不同
# spring.mail.host=smtp.163.com
# spring.mail.port=587
# spring.mail.username=你的完整网易邮箱地址@163.com
# spring.mail.password=你的16位授权码
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true # 启用STARTTLS加密
# spring.mail.properties.mail.smtp.starttls.required=true # 要求必须使用STARTTLS
# spring.mail.properties.mail.smtp.timeout=10000
# spring.mail.properties.mail.smtp.connectiontimeout=10000
# spring.mail.properties.mail.smtp.writetimeout=10000

# 设置全局编码为UTF-8
server:
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      force: true

# 设置日志编码为UTF-8
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/micro-forum.log
  level:
    '[com.songheqing.microforum]': DEBUG
    # 添加一些常用的框架日志配置，便于调试
    '[org.springframework.web]': DEBUG
    '[org.springframework.security]': DEBUG
    '[org.mybatis]': DEBUG
    '[com.zaxxer.hikari]': DEBUG
  charset:
    console: UTF-8
    file: UTF-8
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10
      total-size-cap: 100MB
      clean-history-on-start: true
      file-name-pattern: logs/micro-forum.log.%d{yyyy-MM-dd}.%i.gz

#Mybatis的相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #开启驼峰命名映射开关
    map-underscore-to-camel-case: true

# JWT 配置
jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough-for-security
  expiration: 2592000000  # 30天，单位：毫秒

# Swagger和SpringDoc配置
# 配置Swagger的请求头
springdoc:
  swagger-ui:
    # 确保显示文件上传控件
    show-common-extensions: true
    try-it-out-enabled: true
  packages-to-scan: com.songheqing.microforum.controller  # 关键：只扫描控制器

# MinIO 配置
minio:
  endpoint: http://169.254.207.194:9000 # 内部访问地址
  public-url: http://169.254.207.194:9000   # 外部访问地址（可选）
  access-key: minioadmin
  secret-key: minioadmin
  buckets:
    public: micro-forum-public
    private: micro-forum-private
    temp: micro-forum-temp

app:
  upload-dir: D:\huang\huang-installation\programming-aids\java\Java-workspae\SongHeQing_Projects\micro-forum\uploads